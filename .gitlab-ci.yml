# Submodule `infra` is not part of the parent tree; `include:local` cannot see those paths on GitLab.
# Pin `ref` to match: `git ls-tree HEAD infra` (update both when bumping the submodule).
include:
  - project: public-work4/infra
    ref: 978f6bde35e483c02855b6e0c1220eecae0b602b
    file:
      - ci/templates/base.gitlab-ci.yml
      - ci/templates/jobs-quality.gitlab-ci.yml
      - ci/templates/deploy-gitlab-pages.gitlab-ci.yml

# CI uses `include: project` above; skip submodule fetch (job token cannot clone infra by default).
variables:
  GIT_SUBMODULE_STRATEGY: none
